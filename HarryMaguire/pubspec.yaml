name: harry_potter_app
description: Harry Potter App - Responsi TPM

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Routing
  get: ^4.7.2

  # Local Storage
  get_storage: ^2.1.1

  # HTTP Request
  http: ^1.5.0

  # Font
  google_fonts: ^6.3.1

  # Animation
  flutter_animate: ^4.5.2

  gap: ^3.0.1

  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/